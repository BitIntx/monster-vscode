<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="840" viewBox="0 0 1400 840" role="img" aria-label="Monster Language for VS Code">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff7ec"/>
      <stop offset="100%" stop-color="#ffd8a7"/>
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#24170c"/>
      <stop offset="100%" stop-color="#140d07"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#7f3e00" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1400" height="840" fill="url(#bg)"/>
  <circle cx="1260" cy="120" r="170" fill="#ffb257" opacity="0.28"/>
  <circle cx="120" cy="720" r="210" fill="#ff8a1f" opacity="0.12"/>
  <circle cx="530" cy="760" r="120" fill="#fff0d7" opacity="0.75"/>

  <g filter="url(#shadow)">
    <rect x="88" y="118" width="420" height="604" rx="34" fill="#fffaf3" stroke="#f0c88d" stroke-width="2"/>
    <text x="138" y="190" fill="#c15700" font-size="29" font-family="DejaVu Sans, Arial, sans-serif" font-weight="700">Monster Language</text>
    <text x="138" y="272" fill="#20150c" font-size="62" font-family="DejaVu Sans, Arial, sans-serif" font-weight="800">Monster in</text>
    <text x="138" y="338" fill="#20150c" font-size="62" font-family="DejaVu Sans, Arial, sans-serif" font-weight="800">VS Code</text>
    <text x="138" y="410" fill="#5f4732" font-size="24" font-family="DejaVu Sans, Arial, sans-serif">Syntax highlighting for</text>
    <text x="138" y="444" fill="#5f4732" font-size="24" font-family="DejaVu Sans, Arial, sans-serif">Monster source files,</text>
    <text x="138" y="478" fill="#5f4732" font-size="24" font-family="DejaVu Sans, Arial, sans-serif">plus snippets and</text>
    <text x="138" y="512" fill="#5f4732" font-size="24" font-family="DejaVu Sans, Arial, sans-serif">a dedicated .mnst icon.</text>

    <rect x="138" y="550" width="190" height="58" rx="18" fill="#ff8a1f"/>
    <text x="233" y="588" text-anchor="middle" fill="#1c1207" font-size="23" font-family="DejaVu Sans, Arial, sans-serif" font-weight="800">.mnst support</text>

    <rect x="346" y="550" width="108" height="58" rx="18" fill="#fff0db" stroke="#efc181" stroke-width="2"/>
    <text x="400" y="588" text-anchor="middle" fill="#a04a00" font-size="21" font-family="DejaVu Sans, Arial, sans-serif" font-weight="700">snippets</text>

    <rect x="138" y="640" width="230" height="56" rx="16" fill="#fff6ea" stroke="#ebb875" stroke-width="2"/>
    <text x="253" y="675" text-anchor="middle" fill="#9b4600" font-size="21" font-family="DejaVu Sans, Arial, sans-serif" font-weight="700">Marketplace ready</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="560" y="108" width="764" height="624" rx="34" fill="url(#panel)"/>
    <rect x="560" y="108" width="764" height="80" rx="34" fill="#3a220d"/>
    <circle cx="614" cy="149" r="10" fill="#ff7a6d"/>
    <circle cx="646" cy="149" r="10" fill="#ffd166"/>
    <circle cx="678" cy="149" r="10" fill="#73d992"/>
    <text x="720" y="158" fill="#f7d8b0" font-size="24" font-family="DejaVu Sans Mono, monospace">exam.mnst</text>

    <text x="620" y="266" fill="#ffb257" font-size="31" font-family="DejaVu Sans Mono, monospace">fn</text>
    <text x="666" y="266" fill="#f5efe7" font-size="31" font-family="DejaVu Sans Mono, monospace">main()</text>
    <text x="814" y="266" fill="#ffb257" font-size="31" font-family="DejaVu Sans Mono, monospace">-&gt;</text>
    <text x="878" y="266" fill="#8fd4ff" font-size="31" font-family="DejaVu Sans Mono, monospace">i32</text>
    <text x="944" y="266" fill="#f5efe7" font-size="31" font-family="DejaVu Sans Mono, monospace">{</text>

    <text x="660" y="344" fill="#7fd6a3" font-size="29" font-family="DejaVu Sans Mono, monospace">print_str</text>
    <text x="816" y="344" fill="#f5efe7" font-size="29" font-family="DejaVu Sans Mono, monospace">(</text>
    <text x="834" y="344" fill="#ffd79f" font-size="29" font-family="DejaVu Sans Mono, monospace">"Hello, World!"</text>
    <text x="1070" y="344" fill="#f5efe7" font-size="29" font-family="DejaVu Sans Mono, monospace">);</text>

    <text x="660" y="422" fill="#ffb257" font-size="29" font-family="DejaVu Sans Mono, monospace">let</text>
    <text x="710" y="422" fill="#f5efe7" font-size="29" font-family="DejaVu Sans Mono, monospace">answer:</text>
    <text x="834" y="422" fill="#8fd4ff" font-size="29" font-family="DejaVu Sans Mono, monospace">i32</text>
    <text x="894" y="422" fill="#f5efe7" font-size="29" font-family="DejaVu Sans Mono, monospace">=</text>
    <text x="926" y="422" fill="#c9a6ff" font-size="29" font-family="DejaVu Sans Mono, monospace">40</text>
    <text x="966" y="422" fill="#f5efe7" font-size="29" font-family="DejaVu Sans Mono, monospace">+</text>
    <text x="1000" y="422" fill="#c9a6ff" font-size="29" font-family="DejaVu Sans Mono, monospace">2</text>
    <text x="1022" y="422" fill="#f5efe7" font-size="29" font-family="DejaVu Sans Mono, monospace">;</text>

    <text x="660" y="500" fill="#ffb257" font-size="29" font-family="DejaVu Sans Mono, monospace">if</text>
    <text x="700" y="500" fill="#f5efe7" font-size="29" font-family="DejaVu Sans Mono, monospace">answer</text>
    <text x="804" y="500" fill="#f5efe7" font-size="29" font-family="DejaVu Sans Mono, monospace">==</text>
    <text x="854" y="500" fill="#c9a6ff" font-size="29" font-family="DejaVu Sans Mono, monospace">42</text>
    <text x="892" y="500" fill="#f5efe7" font-size="29" font-family="DejaVu Sans Mono, monospace">{</text>

    <text x="700" y="578" fill="#7fd6a3" font-size="29" font-family="DejaVu Sans Mono, monospace">print_bool</text>
    <text x="852" y="578" fill="#f5efe7" font-size="29" font-family="DejaVu Sans Mono, monospace">(</text>
    <text x="870" y="578" fill="#8ff0c7" font-size="29" font-family="DejaVu Sans Mono, monospace">true</text>
    <text x="932" y="578" fill="#f5efe7" font-size="29" font-family="DejaVu Sans Mono, monospace">);</text>

    <text x="660" y="656" fill="#ffb257" font-size="29" font-family="DejaVu Sans Mono, monospace">return</text>
    <text x="758" y="656" fill="#c9a6ff" font-size="29" font-family="DejaVu Sans Mono, monospace">0</text>
    <text x="776" y="656" fill="#f5efe7" font-size="29" font-family="DejaVu Sans Mono, monospace">;</text>
    <text x="620" y="708" fill="#f5efe7" font-size="31" font-family="DejaVu Sans Mono, monospace">}</text>
  </g>
</svg>
